version: "3.9"

services:
  django:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    command: /start.sh
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .envs/.env.local
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    volumes:
      - local_postgres_data:/var/lib/postgresql/data
    env_file:
      - .envs/.env.local

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery_worker:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    command: celery -A config worker -l info
    volumes:
      - .:/app
    env_file:
      - .envs/.env.local
    depends_on:
      - django
      - redis

volumes:
  local_postgres_data: {}
